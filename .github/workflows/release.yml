  semver-parser:
    name: Parse the semantic version from the release
    runs-on: ubuntu-latest
    steps:
     - name: Parse semver string
       id: semver_parser 
       uses: mtkennerly/poetry-dynamic-versioning@v1.9.1
    outputs:
      semver: "${{ steps.semver_parser.outputs.version }}"


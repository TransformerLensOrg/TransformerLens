[regex1]
regex: \d{1,2}/\d{1,2}/\d{2,4}
replace: DATE-STAMP

[regex2]
regex: \d{2}:\d{2}:\d{2}
replace: TIME-STAMP

[regex3]
regex: 0[xX][0-9a-fA-F]+
replace: HEX-CODE

[regex4]
regex: ,\s*device='[^']*'
replace:

[regex5]
regex: ([1-9]\d*\.\d{3})\d+
replace: \1

[regex6a]
regex: (0\.000[1-9]\d{2})\d+
replace: \1

[regex6b]
regex: (0\.00[1-9]\d{2})\d+
replace: \1

[regex6c]
regex: (0\.0[1-9]\d{2})\d+
replace: \1

[regex6d]
regex: (0\.[1-9]\d{2})\d+
replace: \1
